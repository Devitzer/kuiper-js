name: "NPM Publish"

on:
  release:
    types: [published]
  workflow_dispatch:
      
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      ## BUILD TYPESCRIPT ##
      - name: Build
        run: npm run build

      ## PUBLISH PACKAGE ##
      - name: Publish
        run: npm publish --provenance --access public
        working-directory: ./